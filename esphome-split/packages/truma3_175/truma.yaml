# compile avec
#  framework:
#    type: esp-idf
#=============================

external_components:
  - source:
      type: git
      # url: https://github.com/havanti/esphome-truma
      url : https://github.com/kamahat/esphome-truma
      # url : https://github.com/kamahat/esphome-truma_inetbox
      # url: https://github.com/skrebber/esphome-truma_inetbox
      ## url: https://github.com/simplenotezy/esphome-truma_inetbox
      ref: main
    components: ["truma_inetbox", uart]
    refresh: 0s

globals:
  - id: decoking_remaining
    type: int
    restore_value: false
    initial_value: '0'
# uart:
#   - id: lin_uart_bus
#     tx_pin: GPIO17
#     rx_pin: GPIO15
#     baud_rate: 9600
#     data_bits: 8
#     parity: NONE
#     stop_bits: 2

truma_inetbox:
  id: truma_inetbox_id
  uart_id: lin_uart_bus
  time_id: pcf8563_time
  lin_checksum: VERSION_2
  # time_id: pcf8563_time
  # # cs_pin: 5
  # # fault_pin: 18

  # # Advanced users can use `on_heater_message` action. The heater data is in the `message` variable.
  on_heater_message:
    then:
    - logger.log:
        format: "Message from CP Plus."
        level: INFO
    - if:
        condition:
          lambda: return message->operating_status == truma_inetbox::OperatingStatus::OPERATING_STATUS_OFF;
        then:
          - logger.log:
              format: "Heater is off."
              level: INFO

binary_sensor:
  - platform: truma_inetbox
    name: "CP Plus alive"
    type: CP_PLUS_CONNECTED
    entity_category: diagnostic
    id: cp_plus_alive
  - platform: truma_inetbox
    name: "Heater has error"
    type: HEATER_HAS_ERROR

  - platform: truma_inetbox
    name: "Room Heater active"
    type: HEATER_ROOM
    id: HEATER_ROOM
  - platform: truma_inetbox
    name: "Water Heater active"
    type: HEATER_WATER
    id: HEATER_WATER
  - platform: truma_inetbox
    name: "Heater mode Diesel"
    type: HEATER_DIESEL

  - platform: truma_inetbox
    name: "Timer active"
    type: TIMER_ACTIVE
    id: TIMER_ACTIVE
  - platform: truma_inetbox
    name: "Timer Room Heater active"
    type: TIMER_ROOM
  - platform: truma_inetbox
    name: "Timer Water Heater active"
    type: TIMER_WATER

number:
  - platform: truma_inetbox
    name: "Target Room Temperature"
    type: TARGET_ROOM_TEMPERATURE
  - platform: truma_inetbox
    name: "Target Water Temperature"
    type: TARGET_WATER_TEMPERATURE

sensor:
  - platform: truma_inetbox
    name: "Current Room Temperature"
    type: CURRENT_ROOM_TEMPERATURE
  - platform: truma_inetbox
    name: "Current Water Temperature"
    type: CURRENT_WATER_TEMPERATURE
  - platform: truma_inetbox
    name: "Target Room Temperature"
    type: TARGET_ROOM_TEMPERATURE
  - platform: truma_inetbox
    name: "Target Water Temperature"
    type: TARGET_WATER_TEMPERATURE
  - platform: truma_inetbox
    name: "Heating mode"
    type: HEATING_MODE
  - platform: truma_inetbox
    name: "Operating status"
    type: OPERATING_STATUS
  - platform: truma_inetbox
    name: "Heater error code"
    type: HEATER_ERROR_CODE
  - platform: template
    name: "Diesel De-coking Remaining Time"
    id: decoking_timer_sensor
    unit_of_measurement: "min"
    accuracy_decimals: 0
    icon: mdi:timer-outline
    state_class: measurement

script:
  - id: script_diesel_decoking
    then:
      - select.set:
          id: select_energy_mix
          option: "Diesel"
      - truma_inetbox.heater.set_target_room_temperature:
          temperature: 30
          heating_mode: HIGH
      - lambda: |-
          id(decoking_remaining) = 45;
          id(decoking_timer_sensor).publish_state(45);
      - delay: 45min
      - truma_inetbox.heater.set_target_room_temperature:
          temperature: 0
      - lambda: |-
          id(decoking_remaining) = 0;
          id(decoking_timer_sensor).publish_state(0);
  
switch:
  - platform: template
    name: "Activate Room Heater"
    lambda: |-
      return id(HEATER_ROOM).state;
    turn_on_action:
      - truma_inetbox.heater.set_target_room_temperature:
          # You can use lambda functions
          temperature: !lambda |-
            return 16;
          # Optional set heating mode: `"OFF"`, `ECO`, `HIGH`, `BOOST`
          heating_mode: HIGH
    turn_off_action:
      - truma_inetbox.heater.set_target_room_temperature:
          # Disable heater by setting temperature to `0`.
          temperature: 0
  - platform: template
    name: "Activate Water Heater"
    lambda: |-
      return id(HEATER_WATER).state;
    turn_on_action:
      - truma_inetbox.heater.set_target_water_temperature:
          # Set water temp as number: `0`, `40`, `60`, `80`
          temperature: 60
    turn_off_action:
      - truma_inetbox.heater.set_target_water_temperature:
          # Disable heater by setting temperature to `0`.
          temperature: 0
  - platform: template
    name: "Activate Water Heater (enum)"
    lambda: |-
      return id(HEATER_WATER).state;
    turn_on_action:
      - truma_inetbox.heater.set_target_water_temperature_enum:
          # Set water temp as text: `"OFF"`, `ECO`, `HIGH`, `BOOST`
          temperature: BOOST
    turn_off_action:
      #   # You can also use the simplified syntax.
      - truma_inetbox.heater.set_target_water_temperature_enum:
          temperature: "OFF"
  - platform: template
    name: "Activate Timer"
    lambda: |-
      return id(TIMER_ACTIVE).state;
    turn_on_action:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.timer.activate:
          start: 7:00
          stop: 7:45
          room_temperature: 18
          heating_mode: ECO
          water_temperature: 40
          energy_mix: DIESEL
          watt: 0
    turn_off_action:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.timer.disable
  #=============================

climate:
  - platform: truma_inetbox
    id: truma_climate_raditeur
    name: "Chauffage"
    type: ROOM
  - platform: truma_inetbox
    id: truma_climate_eau_chaude
    name: "Eau chaude"
    type: WATER

select:
  - platform: truma_inetbox
    name: "Energy Mix"
    id: select_energy_mix
    type: HEATER_ENERGY_MIX_DIESEL
  - platform: truma_inetbox
    name: "Fan Mode"
    type: HEATER_FAN_MODE_COMBI

interval:
  - interval: 1min
    then:
      - if:
          condition:
            lambda: 'return id(decoking_remaining) > 0;'
          then:
            - lambda: |-
                id(decoking_remaining) -= 1;
                id(decoking_timer_sensor).publish_state(id(decoking_remaining));

button:
  - platform: template
    name: "Start Diesel De-coking"
    icon: mdi:fire
    on_press:
      - script.execute: script_diesel_decoking
  - platform: template
    name: "Abort Diesel De-coking"
    icon: mdi:stop
    on_press:
      - script.stop: script_diesel_decoking
      - truma_inetbox.heater.set_target_room_temperature:
          temperature: 0
      - lambda: |-
          id(decoking_remaining) = 0;
          id(decoking_timer_sensor).publish_state(0);
